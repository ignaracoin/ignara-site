<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<style>

<script>

/* LAVA BACKGROUND */

const canvas=document.getElementById("lavaCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let lava=[]

for(let i=0;i<200;i++){
lava.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*3+1,
speed:Math.random()*1.5
})
}

function lavaAnim(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#ff6a00"

lava.forEach(p=>{
ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.y-=p.speed

if(p.y<0){
p.y=canvas.height
p.x=Math.random()*canvas.width
}

})

requestAnimationFrame(lavaAnim)
}

lavaAnim()

/* COIN 3D */

const coinScene=new THREE.Scene()

const coinCamera=new THREE.PerspectiveCamera(75,1,0.1,1000)

const coinRenderer=new THREE.WebGLRenderer({alpha:true})

coinRenderer.setSize(260,260)

document.getElementById("coinCanvas").appendChild(coinRenderer.domElement)

const geometry=new THREE.CylinderGeometry(2,2,0.4,64)

const texture=new THREE.TextureLoader().load("ignara-coin.png")

const material=new THREE.MeshStandardMaterial({
map:texture,
metalness:1,
roughness:.3
})

const coin=new THREE.Mesh(geometry,material)

coinScene.add(coin)

const light=new THREE.PointLight(0xffffff,1)

light.position.set(5,5,5)

coinScene.add(light)

coinCamera.position.z=5

function coinAnim(){
requestAnimationFrame(coinAnim)
coin.rotation.y+=0.02
coinRenderer.render(coinScene,coinCamera)
}

coinAnim()

/* MASCOT 3D */

const mScene=new THREE.Scene()

const mCamera=new THREE.PerspectiveCamera(75,1,0.1,1000)

const mRenderer=new THREE.WebGLRenderer({alpha:true})

mRenderer.setSize(320,320)

document.getElementById("mascot3d").appendChild(mRenderer.domElement)

const loader=new THREE.GLTFLoader()

loader.load("dragon.glb",function(gltf){

const model=gltf.scene

model.scale.set(2,2,2)

mScene.add(model)

function animate(){
requestAnimationFrame(animate)
model.rotation.y+=0.01
mRenderer.render(mScene,mCamera)
}

animate()

})

mCamera.position.z=5

/* DATA */

async function loadData(){

let res=await fetch("https://api.dexscreener.com/latest/dex/pairs/bsc/PAIR_ADDRESS")

let data=await res.json()

let pair=data.pair

document.getElementById("price").innerText="Price: $"+pair.priceUsd
document.getElementById("marketcap").innerText="Marketcap: $"+pair.fdv
document.getElementById("volume").innerText="Volume: $"+pair.volume.h24

}

loadData()

setInterval(loadData,10000)

/* HOLDERS */

async function holders(){

let res=await fetch("https://api.bscscan.com/api?module=token&action=tokenholdercount&contractaddress=CONTRACT_ADDRESS")

let data=await res.json()

document.getElementById("holders").innerText="Holders: "+data.result

}

holders()

</script>

</body>
</html>
