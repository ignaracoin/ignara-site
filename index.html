<script>

/* GPU FIRE */

const fire = document.getElementById("fireCanvas")

const ctx = fire.getContext("2d")

fire.width = window.innerWidth
fire.height = window.innerHeight

let particles=[]

for(let i=0;i<150;i++){

particles.push({

x:Math.random()*fire.width,

y:Math.random()*fire.height,

size:Math.random()*3+1,

speed:Math.random()*2

})

}

function fireAnim(){

ctx.fillStyle="rgba(0,0,0,0.25)"

ctx.fillRect(0,0,fire.width,fire.height)

ctx.fillStyle="#ff6a00"

particles.forEach(p=>{

ctx.beginPath()

ctx.arc(p.x,p.y,p.size,0,Math.PI*2)

ctx.fill()

p.y-=p.speed

if(p.y<0){

p.y=fire.height
p.x=Math.random()*fire.width

}

})

requestAnimationFrame(fireAnim)

}

fireAnim()

/* COIN */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(75,1,0.1,1000)

const renderer = new THREE.WebGLRenderer({alpha:true})

renderer.setSize(260,260)

document.getElementById("coinCanvas").appendChild(renderer.domElement)

const geometry = new THREE.CylinderGeometry(2,2,0.4,64)

const material = new THREE.MeshStandardMaterial({

color:0xff8c00,
metalness:1,
roughness:0.2

})

const coin = new THREE.Mesh(geometry,material)

scene.add(coin)

const light = new THREE.PointLight(0xffffff,1)

light.position.set(5,5,5)

scene.add(light)

camera.position.z=5

function coinAnim(){

requestAnimationFrame(coinAnim)

coin.rotation.y+=0.03

renderer.render(scene,camera)

}

coinAnim()

/* DEX DATA */

async function loadData(){

try{

let res=await fetch("https://api.dexscreener.com/latest/dex/pairs/bsc/PAIR_ADDRESS")

let data=await res.json()

let pair=data.pair

document.getElementById("price").innerText="Price: $"+pair.priceUsd

document.getElementById("marketcap").innerText="Marketcap: $"+pair.fdv

}catch{

document.getElementById("price").innerText="Price unavailable"

}

}

loadData()

setInterval(loadData,10000)

/* HOLDERS BSC */

async function loadHolders(){

try{

let res=await fetch("https://api.bscscan.com/api?module=token&action=tokenholdercount&contractaddress=CONTRACT_ADDRESS")

let data=await res.json()

document.getElementById("holders").innerText="Holders: "+data.result

}catch{

document.getElementById("holders").innerText="Holders unavailable"

}

}

loadHolders()

</script>
