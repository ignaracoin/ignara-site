<script>

/* PARTICLES */

const canvas = document.getElementById("particles")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles=[]

for(let i=0;i<150;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle="#ff6a00"
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

/* HOLDERS FROM BLOCKCHAIN */

async function loadHolders(){

try{

let response = await fetch("https://api.etherscan.io/api?module=token&action=tokenholdercount&contractaddress=CONTRACT_ADDRESS&apikey=YourApiKey")

let data = await response.json()

document.getElementById("holders").innerText =
"Holders: " + data.result

}catch{

document.getElementById("holders").innerText =
"Holders: unavailable"

}

}

loadHolders()

</script>
