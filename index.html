<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IGNARA COIN</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* WEBGL BACKGROUND */

#bg3d{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,120,0,0.3);
}

.logo{
font-size:28px;
font-weight:800;
background:linear-gradient(#ffd27f,#ff6a00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 30px #ff6a00;
}

nav a{
margin-left:25px;
color:#ccc;
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:#ff8c00;
text-shadow:0 0 10px #ff6a00;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;

justify-content:center;
text-align:center;
}

.hero h1{
font-size:100px;
background:linear-gradient(#ffd27f,#ff6a00);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 35px #ff6a00;
}

.hero p{
margin-top:10px;
color:#aaa;
font-size:22px;
}

/* MASCOT */

.mascot{
width:420px;
margin-top:40px;

}

/* COIN */

#coin{

}

.buy{

box-shadow:0 0 35px #ff6a00;

.stats{

</style>

</head>

<body>

<canvas id="bg3d"></canvas>

<header>

<div class="logo">IGNARA</div>

<nav>

<a href="#chart">Chart</a>
<a href="#community">Community</a>

</nav>

</header>

<section class="hero">

<h1>IGNARA</h1>
<p>From Zero To Millions</p>

<img class="mascot" src="ignara-mascot2.png">

<div id="coin"></div>

<a href="https://pancakeswap.finance">
<button class="buy">BUY ON BNB</button>
</a>

<div class="stats">

<div id="price">Price: loading...</div>
<div id="marketcap">Marketcap: loading...</div>

</div>

</section>

<section id="chart" class="section">

<h2>Live Chart</h2>

<iframe
src="https://dexscreener.com/bsc/PAIR_ADDRESS"
width="100%"
height="600"
frameborder="0">
</iframe>

</section>

<section id="community" class="section">

<h2>Community</h2>

<a href="https://x.com/IgnaraCoin" target="_blank">
Twitter
</a>

</section>

<footer>

© 2026 IGNARA COIN

</footer>

<script>

/* WEBGL METAVERSE BACKGROUND */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("bg3d"),
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

camera.position.z = 5

const geometry = new THREE.BufferGeometry()
const vertices=[]

for(let i=0;i<2000;i++){

vertices.push(
Math.random()*200-100,
Math.random()*200-100,
Math.random()*200-100
)

}

geometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(vertices,3)
)

const material = new THREE.PointsMaterial({
color:0xff6a00,
size:0.7
})

const stars = new THREE.Points(geometry,material)

scene.add(stars)

function animate(){

requestAnimationFrame(animate)

stars.rotation.y+=0.0007

renderer.render(scene,camera)

}

animate()

/* COIN SPIN */

const coinScene = new THREE.Scene()

const coinCamera = new THREE.PerspectiveCamera(
75,1,0.1,1000
)

const coinRenderer = new THREE.WebGLRenderer({alpha:true})

coinRenderer.setSize(220,220)

document.getElementById("coin").appendChild(coinRenderer.domElement)

const coinGeometry = new THREE.CylinderGeometry(2,2,0.3,64)

const coinMaterial = new THREE.MeshBasicMaterial({
color:0xff8c00,
wireframe:false
})

const coin = new THREE.Mesh(coinGeometry,coinMaterial)

coinScene.add(coin)

coinCamera.position.z=5

function animateCoin(){

requestAnimationFrame(animateCoin)

coin.rotation.y+=0.03

coinRenderer.render(coinScene,coinCamera)

}

animateCoin()

/* DEXSCREENER API */

async function loadData(){

try{

let res = await fetch(
"https://api.dexscreener.com/latest/dex/pairs/bsc/PAIR_ADDRESS"
)

let data = await res.json()

let pair = data.pair

document.getElementById("price").innerText =
"Price: $" + pair.priceUsd

document.getElementById("marketcap").innerText =
"Marketcap: $" + pair.fdv

}catch{

document.getElementById("price").innerText="Price unavailable"

}

}

loadData()

setInterval(loadData,10000)

</script>

</body>
</html>
